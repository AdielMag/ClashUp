services:
  mongo:
    image: mongo:7
    container_name: clashup-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - clashup-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clashup-mongo-data:
